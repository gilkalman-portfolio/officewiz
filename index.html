<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfficeWiz · שלומית קלמן — Back Office, גבייה והנהלת חשבונות</title>
<meta name="description" content="שלומית קלמן — שירותי Back Office, גבייה והנהלת חשבונות לעצמאים ועסקים קטנים.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&family=Secular+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<!-- topbar -->
<header class="topbar">
  <a class="topbar-logo" href="#">
    <img src="assets/logo.png" alt="OfficeWiz" height="38">
  </a>
  <nav class="topbar-nav">
    <a href="#services">שירותים</a>
    <a href="#about">נעים להכיר</a>
    <a href="#process">איך זה עובד</a>
    <a href="#faq">שאלות</a>
    <a href="#contact">צור קשר</a>
  </nav>
  <a href="#contact" class="btn btn-coral btn-sm" data-wa>בואו נדבר</a>
</header>

<!-- hero -->
<section>
  <div class="hero">
    <div class="hero-text">
      <p class="hero-name">שלומית קלמן · <span class="brand-en">OfficeWiz</span></p>
      <h1 id="hero-title"></h1>
      <p class="lead" id="hero-subtitle"></p>
      <div class="hero-ctas">
        <a href="#" class="btn btn-coral btn-lg" data-wa id="hero-cta1"></a>
        <a href="#services" class="btn btn-ghost btn-lg" id="hero-cta2"></a>
      </div>
      <p class="hero-badge" id="hero-badge"></p>
    </div>
    <div class="hero-visual">
      <div class="task-stack" id="task-stack"></div>
      <p class="task-caption">המשימות שאת/ה לא צריך/ה לחשוב עליהן יותר</p>
    </div>
  </div>
</section>

<!-- pain -->
<section class="section section-deep" id="pain">
  <div class="wrap">
    <p class="eyebrow eyebrow-light" id="pain-eyebrow"></p>
    <h2 id="pain-title"></h2>
    <div class="pain-grid" id="pain-grid"></div>
    <p class="pain-closing" id="pain-closing"></p>
  </div>
</section>

<!-- about -->
<section class="section section-mist" id="about">
  <div class="wrap">
    <div class="about-grid">
      <div class="about-photo-wrap">
        <div class="about-photo" id="about-photo"></div>
      </div>
      <div class="about-text">
        <p class="eyebrow" id="about-eyebrow"></p>
        <h2 id="about-title"></h2>
        <div id="about-body"></div>
        <p class="cert-badge" id="about-badge" style="margin-top:1.4em"></p>
      </div>
    </div>
  </div>
</section>

<!-- services -->
<section class="section" id="services">
  <div class="wrap">
    <div class="center">
      <p class="eyebrow" id="services-eyebrow"></p>
      <h2 id="services-title"></h2>
    </div>
    <div class="services-grid" id="services-grid"></div>
    <p class="services-closing center" id="services-closing"></p>
  </div>
</section>

<!-- process -->
<section class="section section-mist" id="process">
  <div class="wrap">
    <p class="eyebrow" id="process-eyebrow"></p>
    <h2 id="process-title"></h2>
    <ol class="process-list" id="process-list"></ol>
  </div>
</section>

<!-- faq -->
<section class="section" id="faq">
  <div class="wrap wrap-narrow">
    <div class="center">
      <p class="eyebrow" id="faq-eyebrow"></p>
      <h2 id="faq-title"></h2>
    </div>
    <div style="margin-top:2em" id="faq-list"></div>
  </div>
</section>

<!-- contact -->
<section class="section section-contact" id="contact">
  <div class="wrap center">
    <p class="eyebrow eyebrow-light" id="contact-eyebrow"></p>
    <h2 id="contact-title"></h2>
    <p class="lead lead-light" id="contact-subtitle"></p>
    <a href="#" class="btn btn-coral btn-lg" data-wa id="contact-cta"></a>
    <div class="contact-alt" id="contact-alt"></div>
  </div>
</section>

<!-- footer -->
<footer class="footer">
  <span id="footer-line"></span>
</footer>

<!-- whatsapp float -->
<a href="#" class="wa-float" data-wa aria-label="שלח הודעה בוואטסאפ">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script src="app.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
      }
    });
  }
</script>
</body>
</html>
